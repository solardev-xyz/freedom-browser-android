<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src http://127.0.0.1:*;"
    />
    <title>Content Unavailable</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: radial-gradient(ellipse at top left, #1f1f1f 0%, #141414 60%);
        color: #f5f5f5;
        padding: 32px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-sizing: border-box;
      }
      .container {
        max-width: 560px;
        width: 100%;
      }
      h1 {
        font-size: 22px;
        margin: 24px 0 12px 0;
        color: #ff5e5e;
      }
      p {
        line-height: 1.55;
        margin: 0 0 20px 0;
        color: #ccc;
        font-size: 15px;
      }
      .error-details {
        background: #1a1a1a;
        padding: 14px 16px;
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 13px;
        color: #ff8a8a;
        margin: 0 0 24px 0;
        word-break: break-all;
        white-space: pre-wrap;
        text-align: left;
      }
      button {
        padding: 12px 22px;
        background: #2c2c2c;
        color: white;
        border: 1px solid #444;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        min-height: 44px;
      }
      button:active {
        background: #3a3a3a;
      }
      .nodes-icon {
        display: inline-block;
        width: 1.2em;
        height: 1.2em;
        vertical-align: middle;
        margin: 0 2px;
      }

      @media (prefers-color-scheme: light) {
        body {
          background: radial-gradient(ellipse at top left, #f6f8fa 0%, #ffffff 60%);
          color: #24292f;
        }
        h1 {
          color: #cf222e;
        }
        p {
          color: #57606a;
        }
        .error-details {
          background: #f6f8fa;
          color: #cf222e;
        }
        button {
          background: #f6f8fa;
          border-color: #d0d7de;
          color: #24292f;
        }
        button:active {
          background: #e8eaed;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 id="title">Content Unavailable</h1>
      <p id="description">
        This content could not be retrieved from the decentralized network. The address may be
        invalid, the content may no longer exist, or no peers are serving it.
      </p>
      <div id="details" class="error-details"></div>
      <button id="retry-btn">Try Again</button>
    </div>

    <script>
      const NODES_ICON =
        '<svg class="nodes-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><style>.net-line{stroke:currentColor;stroke-width:8;stroke-linecap:round}.net-node{fill:none;stroke:currentColor;stroke-width:8}</style><line x1="44.5" y1="33.5" x2="25.5" y2="66.5" class="net-line"/><line x1="55.5" y1="33.5" x2="74.5" y2="66.5" class="net-line"/><line x1="31" y1="76" x2="69" y2="76" class="net-line"/><circle cx="50" cy="24" r="11" class="net-node"/><circle cx="20" cy="76" r="11" class="net-node"/><circle cx="80" cy="76" r="11" class="net-node"/></svg>';

      function detectProtocol(url) {
        if (!url) return null;
        if (url.match(/^bzz:\/\//i) || url.match(/\/bzz\//i)) return 'swarm';
        if (url.match(/^ipfs:\/\//i) || url.match(/\/ipfs\//i)) return 'ipfs';
        if (url.match(/^ipns:\/\//i) || url.match(/\/ipns\//i)) return 'ipns';
        return null;
      }

      function toProtocolUrl(url) {
        if (!url) return null;
        const bzzMatch = url.match(/\/bzz\/([a-fA-F0-9]{64,128})(\/.*)?/);
        if (bzzMatch) return 'bzz://' + bzzMatch[1] + (bzzMatch[2] || '');
        const ipfsMatch = url.match(/\/ipfs\/([a-zA-Z0-9]+)(\/.*)?/);
        if (ipfsMatch) return 'ipfs://' + ipfsMatch[1] + (ipfsMatch[2] || '');
        const ipnsMatch = url.match(/\/ipns\/([a-zA-Z0-9.-]+)(\/.*)?/);
        if (ipnsMatch) return 'ipns://' + ipnsMatch[1] + (ipnsMatch[2] || '');
        return url;
      }

      const params = new URLSearchParams(window.location.search);
      const error = params.get('error');
      const url = params.get('url');
      const explicitProtocol = params.get('protocol');
      const retryUrl = params.get('retry') || url;
      const detail = params.get('detail');
      const protocolUrl = toProtocolUrl(url);
      const protocol = explicitProtocol || detectProtocol(url);

      const detailsEl = document.getElementById('details');
      const descriptionEl = document.getElementById('description');
      const titleEl = document.getElementById('title');

      async function checkSwarmStatus() {
        try {
          const res = await fetch('http://127.0.0.1:1633/health');
          return { running: res.ok };
        } catch (e) {
          return { running: false };
        }
      }

      async function displayError() {
        const parts = [];
        if (protocolUrl) parts.push(protocolUrl);
        else if (url) parts.push(url);

        if (error === 'ens_not_found') {
          titleEl.textContent = 'No content for this ENS name';
          descriptionEl.innerHTML =
            "This ENS name doesn't point at any content yet. The owner may not have set a " +
            '<code>contenthash</code> record, or the name has no resolver.';
        } else if (error === 'ens_unsupported_codec') {
          titleEl.textContent = 'Unsupported content format';
          descriptionEl.innerHTML =
            'This ENS name resolves to a content format Freedom Browser cannot load yet on mobile.';
        } else if (error === 'ens_lookup_failed') {
          titleEl.textContent = 'ENS lookup failed';
          descriptionEl.innerHTML =
            "Couldn't reach an Ethereum RPC endpoint to resolve this name. Check your " +
            'connection and try again.';
        } else if (error === 'swarm_content_not_found') {
          titleEl.textContent = 'Content not ready yet';
          descriptionEl.innerHTML =
            "Couldn't find this content on the Swarm network yet. The node is " +
            'still connecting to peers &mdash; try again in a moment.';
          if (protocolUrl) {
            parts.push('');
            parts.push('Swarm content not found (timeout)');
          }
        } else if (error && error.indexOf('ERR_CONNECTION_REFUSED') !== -1) {
          if (protocol === 'swarm') {
            const status = await checkSwarmStatus();
            if (!status.running) {
              descriptionEl.innerHTML =
                'The Swarm node is not running. Open the Nodes panel ' +
                NODES_ICON +
                ' from the menu to start it.';
            } else {
              descriptionEl.innerHTML =
                "Couldn't reach the Swarm gateway. Check that the node is running and try again.";
            }
          }
          parts.push('');
          parts.push(error);
        } else if (error) {
          parts.push('');
          parts.push(error);
        }

        if (detail) {
          parts.push(detail);
        }

        detailsEl.textContent = parts.join('\n') || 'Unknown error';
      }

      displayError();

      document.getElementById('retry-btn').onclick = () => {
        if (retryUrl) {
          window.location.href = retryUrl;
        } else {
          window.location.reload();
        }
      };
    </script>
  </body>
</html>
