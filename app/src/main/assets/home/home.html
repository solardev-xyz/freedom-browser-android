<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self';"
    />
    <title>Freedom</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 32px 24px;
        box-sizing: border-box;
        position: relative;
      }

      /* Dark theme (default) */
      body {
        background: #1f2020;
        color: #c7c7c7;
      }
      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: url('images/home.png') no-repeat center center;
        background-size: cover;
        opacity: 0.6;
        z-index: -1;
      }
      p {
        max-width: 640px;
        line-height: 1.6;
        margin-bottom: 12px;
        font-size: 16px;
      }
      .logo-dark {
        display: block;
      }
      .logo-light {
        display: none;
      }

      /* Light theme */
      @media (prefers-color-scheme: light) {
        body {
          background: #ffffff;
          color: #202124;
        }
        .logo-dark {
          display: none;
        }
        .logo-light {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <img
      class="logo-dark"
      src="images/freedom-logo-white.svg"
      alt="Freedom"
      style="height: 48px; margin-bottom: 24px"
    />
    <img
      class="logo-light"
      src="images/freedom-logo-black.svg"
      alt="Freedom"
      style="height: 48px; margin-bottom: 24px"
    />
    <p>
      The decentralized web is here. Powered by built-in nodes, this browser connects you directly
      to peers, keeping the network strong and user-controlled.
    </p>
  </body>
</html>
